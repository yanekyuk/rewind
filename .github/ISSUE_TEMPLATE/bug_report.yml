name: Bug Report
description: Something isn't working right
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much as you can — it helps a lot.

  - type: input
    id: version
    attributes:
      label: Rewind version
      placeholder: "e.g. 0.5.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Rewind
        2. Select a game
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages or terminal output here.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Steam library path, DepotDownloader version, anything else relevant.
