name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you hit a limitation or friction point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What should Rewind do? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other ways you've thought about solving this?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar tools — anything helpful.
