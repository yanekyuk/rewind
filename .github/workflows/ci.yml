name: CI

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - next

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libarchive (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libarchive-dev

      - name: Install libarchive (macOS)
        if: runner.os == 'macOS'
        run: brew install libarchive

      - name: Build
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/libarchive/lib/pkgconfig:/usr/local/opt/libarchive/lib/pkgconfig
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test
        if: runner.os == 'Linux'
        run: cargo test
