name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: rewind-x86_64-linux.tar.gz
            binary: rewind
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: rewind-x86_64-windows.zip
            binary: rewind.exe
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            archive: rewind-x86_64-macos.tar.gz
            binary: rewind
          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            archive: rewind-aarch64-macos.tar.gz
            binary: rewind

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libarchive (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libarchive-dev

      - name: Install libarchive (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libarchive
          BREW_PREFIX="$(brew --prefix libarchive)"
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            # Cross-compiling to x86_64 on Apple Silicon: Homebrew only installs
            # arm64 bottles. macOS ships a universal libarchive, so strip the
            # arm64-specific -L path from Homebrew's .pc so the linker falls back
            # to the system's universal libarchive.
            mkdir -p "$RUNNER_TEMP/pkgconfig"
            sed 's|-L[^ ]*libarchive/lib[^ ]* ||g' \
              "${BREW_PREFIX}/lib/pkgconfig/libarchive.pc" \
              > "$RUNNER_TEMP/pkgconfig/libarchive.pc"
            echo "PKG_CONFIG_PATH=$RUNNER_TEMP/pkgconfig" >> "$GITHUB_ENV"
            echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          else
            echo "PKG_CONFIG_PATH=${BREW_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag message
        id: tag_message
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/${TAG} --jq '.object.sha')
          MESSAGE=$(gh api repos/${{ github.repository }}/git/tags/${TAG_SHA} --jq '.message')
          {
            echo "body<<RELEASE_BODY_EOF"
            echo "$MESSAGE"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.tag_message.outputs.body }}
          files: release-assets/*

  update-readme:
    name: Update README Download Links
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update download links
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          sed -i "s#| Windows (64-bit) | .*#| Windows (64-bit) | [\`rewind-x86_64-windows.zip\`](${BASE_URL}/rewind-x86_64-windows.zip) |#" README.md
          sed -i "s#| macOS (Apple Silicon) | .*#| macOS (Apple Silicon) | [\`rewind-aarch64-macos.tar.gz\`](${BASE_URL}/rewind-aarch64-macos.tar.gz) |#" README.md
          sed -i "s#| macOS (Intel) | .*#| macOS (Intel) | [\`rewind-x86_64-macos.tar.gz\`](${BASE_URL}/rewind-x86_64-macos.tar.gz) |#" README.md
          sed -i "s#| Linux (64-bit) | .*#| Linux (64-bit) | [\`rewind-x86_64-linux.tar.gz\`](${BASE_URL}/rewind-x86_64-linux.tar.gz) |#" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "docs: update download links for ${GITHUB_REF#refs/tags/}"
            git push origin main
          }
